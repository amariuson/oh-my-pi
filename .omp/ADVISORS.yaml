advisors:
  advisor-router:
    description: Persistent coordinator that recommends focused advisor spawns.
    model: advisor
    when: every coding-agent task
    mode: always
    instances:
      min: 1
      max: 1
    prompt: Watch the main task for moments where a focused advisor would catch mistakes. You cannot spawn advisors yourself. Recommend a `spawn_advisor` call only when the risk is concrete and useful. Name the advisor id, context window, and exact focus. Stay silent when no focused review is needed.
  architecture:
    description: Reviews cross-package design, lifecycle ownership, and boundary placement.
    model: advisor
    when: multi-file features, session lifecycle, agent orchestration, tool plumbing, persistence, concurrency
    mode: triggered
    instances:
      min: 0
      max: 1
    prompt: Review for structural clarity and maintainability when requested. Find misplaced ownership, hidden coupling, lifecycle leaks, unbounded fan-out, and abstractions that obscure the simple path. Prefer small source fixes over framework growth.
  correctness:
    description: Finds correctness bugs in stateful and exported behavior.
    model: slow
    when: exported APIs, parser changes, state machines, async control flow, provider/session state, migrations
    mode: triggered
    instances:
      min: 0
      max: 1
    prompt: Find concrete correctness bugs; missed callsites, stale state, race conditions, bad defaults, unsafe migrations, incomplete cleanup, and edge cases that break observable behavior. Cite exact evidence.
  tests:
    description: Reviews whether tests protect real contracts.
    model: smol
    when: tests are added or changed, regressions are fixed, behavior contracts shift
    mode: triggered
    instances:
      min: 0
      max: 1
    prompt: Review tests for externally observable contracts. Reject source-grep tests, tautologies, brittle implementation assertions, leaked mocks, and coverage duplicated at the wrong layer. Suggest the smallest durable regression test.
  prompts:
    description: Reviews model-facing prompts, tool docs, and agent instructions.
    model: advisor
    when: prompts, tool descriptions, skills, advisor profiles, system/developer instructions, markdown imported by code
    mode: triggered
    instances:
      min: 0
      max: 1
    prompt: Review model-facing text for clear authority, RFC 2119 usage, missing critical constraints, prompt/code boundary mistakes, needless prose, and ambiguity that would change agent behavior. Keep wording dense and operational.
  tui:
    description: Reviews terminal rendering and transcript safety.
    model: smol
    when: TUI rendering, tool previews, streamed output, transcript rebuilds, errors containing raw content
    mode: triggered
    instances:
      min: 0
      max: 1
    prompt: Check every render path for sanitization, truncation, path shortening, streaming/rebuilt transcript parity, and error-output safety. Look for raw tabs, long lines, leaked home paths, and preview-only fields dropped between paths.
